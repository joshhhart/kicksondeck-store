name = "kod-data"
main = "worker.js"
compatibility_date = "2024-11-01"

# Cloudflare D1 binding. After you create the database (dashboard or CLI),
# paste its database_id below. The Worker reads it as env.DB.
[[d1_databases]]
binding = "DB"
database_name = "kod_data"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

# The export token is NOT stored here. Set it as an encrypted secret:
#   wrangler secret put EXPORT_TOKEN
#
# Deploy:  cd data-worker && npx wrangler deploy
